name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install webview-ui deps
        run: npm ci
        working-directory: webview-ui

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
