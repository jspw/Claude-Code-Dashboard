name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Validate PR title
        run: node scripts/validate-commit-message.mjs --message "${{ github.event.pull_request.title }}" --source "pull request title"

      - name: Validate PR commit messages
        run: node scripts/validate-commit-range.mjs "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Install root deps
        run: npm ci

      - name: Install webview-ui deps
        run: npm ci
        working-directory: webview-ui

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check webview-ui
        run: npx tsc --noEmit
        working-directory: webview-ui

      - name: Run backend tests
        run: npx vitest run --coverage

      - name: Run UI tests
        run: npx vitest run --coverage
        working-directory: webview-ui

      - name: Build
        run: npm run build
