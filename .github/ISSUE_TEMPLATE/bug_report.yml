name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the dashboard
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: Found in VS Code Extensions panel next to "Claude Code Dashboard"
      placeholder: e.g. 1.3.0
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: Help > About > copy version string
      placeholder: e.g. 1.89.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: |
        Open the VS Code Output panel, select "Claude Code Dashboard" in the dropdown, and paste any relevant output here.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, anything else that might help.
